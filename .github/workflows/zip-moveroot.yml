name: Unpack ZIP and Flatten to Root

on:
  push:
    paths: ['**.zip']
  workflow_dispatch:
    inputs:
      zip_file:
        description: '要解压的 ZIP 文件名（例如 "archive.zip"）'
        required: false
        default: ''
      subdir:
        description: '要移动到根目录的子目录名（可选）'
        required: false
        default: ''

jobs:
  unpack-and-move:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ========== 自动模式：push 且只有一个 ZIP 时 ==========
      - name: 自动解压（仅当只有一个 ZIP 文件）
        if: github.event_name == 'push'
        run: |
          shopt -s dotglob
          zip_files=(*.zip)
          count=${#zip_files[@]}

          if [ $count -eq 0 ]; then
            echo "没有找到 ZIP 文件"
            exit 0
          elif [ $count -eq 1 ]; then
            zipfile="${zip_files[0]}"
            echo "自动解压单个 ZIP: $zipfile"
            temp_dir="${zipfile%.zip}_temp_$$"
            mkdir -p "$temp_dir"
            unzip -o "$zipfile" -d "$temp_dir"
            items=("$temp_dir"/*)
            if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
              subdir="${items[0]}"
              mv "$subdir"/* . 2>/dev/null || true
              mv "$subdir"/.[!.]* . 2>/dev/null || true
              rm -rf "$subdir"
            else
              mv "$temp_dir"/* . 2>/dev/null || true
              mv "$temp_dir"/.[!.]* . 2>/dev/null || true
            fi
            rm -rf "$temp_dir"
            rm -f "$zipfile"
          else
            echo "检测到多个 ZIP 文件 ($count 个)，为避免冲突，不自动解压。"
            echo "请手动运行 workflow_dispatch，并指定要解压的 ZIP 文件名。"
            echo "存在的 ZIP 文件："
            printf '  - %s\n' "${zip_files[@]}"
            exit 0
          fi

      # ========== 手动模式：解压指定的 ZIP ==========
      - name: 手动解压指定的 ZIP 文件
        if: github.event_name == 'workflow_dispatch' && inputs.zip_file != ''
        run: |
          shopt -s dotglob
          zipfile="${{ inputs.zip_file }}"
          if [ ! -f "$zipfile" ]; then
            echo "错误：文件 '$zipfile' 不存在"
            echo "当前目录下的 ZIP 文件："
            ls -1 *.zip 2>/dev/null || echo "（无）"
            exit 1
          fi
          echo "手动解压: $zipfile"
          temp_dir="${zipfile%.zip}_temp_$$"
          mkdir -p "$temp_dir"
          unzip -o "$zipfile" -d "$temp_dir"
          items=("$temp_dir"/*)
          if [ ${#items[@]} -eq 1 ] && [ -d "${items[0]}" ]; then
            subdir="${items[0]}"
            mv "$subdir"/* . 2>/dev/null || true
            mv "$subdir"/.[!.]* . 2>/dev/null || true
            rm -rf "$subdir"
          else
            mv "$temp_dir"/* . 2>/dev/null || true
            mv "$temp_dir"/.[!.]* . 2>/dev/null || true
          fi
          rm -rf "$temp_dir"
          rm -f "$zipfile"

      # ========== 手动移动子目录（可选） ==========
      - name: 移动手动指定的子目录到根目录
        if: github.event_name == 'workflow_dispatch' && inputs.subdir != ''
        run: |
          shopt -s dotglob
          SUBDIR="${{ inputs.subdir }}"
          if [ -d "$SUBDIR" ]; then
            echo "移动子目录 '$SUBDIR' 的内容到根目录"
            mv "$SUBDIR"/* . 2>/dev/null || true
            mv "$SUBDIR"/.[!.]* . 2>/dev/null || true
            rm -rf "$SUBDIR"
          else
            echo "错误：子目录 '$SUBDIR' 不存在"
            exit 1
          fi

      # ========== 提交所有更改 ==========
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "自动解压 ZIP 并整理目录结构"
          git push